<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laptop Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Laptop Price Predictor</h1>
        <p class="accuracy">Model Accuracy (R² Score): {{ model_accuracy }}%</p>

        <form action="/predict" method="POST">
            <div class="row">
                <label>Company:</label>
                <select name="company" required>
                    {% for c in companies %}
                        <option value="{{c}}">{{c}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <label>Type:</label>
                <select name="type_name" required>
                    {% for t in types %}
                        <option value="{{t}}">{{t}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <label>RAM (GB):</label>
                <input type="number" name="ram" min="2" max="64" step="2" value="8" required>
            </div>

            <div class="row">
                <label>CPU Brand:</label>
                <select name="cpu" required>
                    {% for c in cpu_brands %}
                        <option value="{{c}}">{{c}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <label>GPU Brand:</label>
                <select name="gpu" required>
                    {% for g in gpu_brands %}
                        <option value="{{g}}">{{g}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <label>Weight (kg):</label>
                <input type="number" name="weight" min="0.8" max="5" step="0.1" value="2.5" required>
            </div>

            <div class="row">
                <label>Touchscreen:</label>
                <select name="touchscreen" required>
                    <option value="Yes">Yes</option>
                    <option value="No" selected>No</option>
                </select>
            </div>

            <div class="row">
                <label>IPS Display:</label>
                <select name="ips" required>
                    <option value="Yes">Yes</option>
                    <option value="No" selected>No</option>
                </select>
            </div>

            <div class="row">
                <label>PPI:</label>
                <input type="number" name="ppi" step="0.1" value="150" required>
            </div>

            <div class="row">
                <label>HDD (GB):</label>
                <input type="number" name="hdd" min="0" max="2000" step="128" value="512" required>
            </div>

            <div class="row">
                <label>SSD (GB):</label>
                <input type="number" name="ssd" min="0" max="2000" step="128" value="256" required>
            </div>

            <div class="row">
                <label>Operating System:</label>
                <select name="os" required>
                    {% for o in os_options %}
                        <option value="{{o}}">{{o}}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">Predict Price</button>
        </form>

        {% if prediction_text %}
            <div class="result">
                <h2>{{ prediction_text }}</h2>
            </div>
        {% endif %}
    </div>
</body>
</html>
